<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100dvh; background: #000; color: white; font-family: monospace; }
  body { display: flex; flex-direction: column; }
  .header { background: #333; padding: 12px; flex: none; }
  main { flex: 1; display: flex; flex-direction: column; min-height: 0; max-width: 800px; margin: 0 auto; width: 100%; }
  .inner { flex: 1; overflow: hidden; min-height: 0; position: relative; }
  .list { position: absolute; inset: 0; overflow-y: auto; padding: 8px 16px; }
  .input { background: #222; padding: 12px; flex: none; }
  .bubble { background: #555; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 2px solid red; }
</style>
</head>
<body>
  <div class="header">HEADER (flex-none)</div>
  <main>
    <div class="inner">
      <div class="list" id="list">
        <div class="bubble">Bubble 1</div>
        <div class="bubble">Bubble 2</div>
        <div class="bubble">Bubble 3</div>
      </div>
    </div>
    <div class="input">INPUT</div>
  </main>
  <div style="position:fixed;top:0;right:0;background:red;color:white;padding:4px 8px;z-index:9999;">
    <span id="info"></span>
  </div>
  <script>
    const list = document.getElementById('list');
    const inner = document.querySelector('.inner');
    const main = document.querySelector('main');
    document.getElementById('info').textContent =
      `list.clientH=${list.clientHeight} scrollH=${list.scrollHeight} | innerH=${inner.clientHeight} | mainH=${main.clientHeight}`;
  </script>
</body>
</html>
