# =============================================================================
# DarkTalk Nginx configuration
# Place at: /etc/nginx/sites-available/darktalk
# Enable:   sudo ln -s /etc/nginx/sites-available/darktalk /etc/nginx/sites-enabled/
# Test:     sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# Rate limiting zone (shared between server blocks if needed)
limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;

# HTTP -> HTTPS redirect (after SSL is set up)
server {
    listen 80;
    listen [::]:80;
    server_name darktalk.duckdns.org _;

    # For Let's Encrypt challenges (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name darktalk.duckdns.org;

    # SSL certs (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/darktalk.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/darktalk.duckdns.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Upload limits (matched to app: 200MB video max)
    client_max_body_size 250M;
    client_body_timeout 120s;

    # Logging
    access_log /var/log/nginx/darktalk-access.log;
    error_log /var/log/nginx/darktalk-error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss;

    # Static files (Next.js)
    location /_next/static/ {
        alias /home/darktalk/app/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Public folder
    location /uploads/ {
        alias /home/darktalk/app/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Socket.IO endpoint (WebSocket upgrade)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # All other traffic to Next.js
    location / {
        limit_req zone=global burst=50 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_redirect off;

        # Timeouts (chat app needs longer)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
