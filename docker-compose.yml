version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:./darktalk.db
      - SESSION_SECRET=change_this_to_random_string_at_least_32_chars
      - NEXT_PUBLIC_WS_URL=ws://localhost:3000
    volumes:
      - ./darktalk.db:/app/darktalk.db

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_PASSWORD=darktalk_secret
      - POSTGRES_DB=darktalk
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  createbuckets:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/darktalk --ignore-existing;
      mc anonymous set download myminio/darktalk;
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
